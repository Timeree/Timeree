<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机 A 股</title>
    <style>
        body {
            background: #0f0f0f;
            color: #00ff9d;
            font-family: 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 40px;
            text-align: center;
        }
        h1 { color: #00ff9d; }
        button {
            background: #00ff9d;
            color: #000;
            border: none;
            padding: 18px 50px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            margin: 30px 0;
        }
        button:hover { background: #00cc7a; transform: scale(1.08); }
        .result {
            margin-top: 40px;
            font-size: 28px;
            background: #1a1a1a;
            padding: 30px;
            border-radius: 12px;
            display: inline-block;
            min-width: 400px;
        }
        .error { color: #ff5555; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>🎲 随机 A 股抽取器</h1>
    <p>点击按钮，随机获取一支 A 股</p>
    
    <button onclick="getRandomStock()">随机抽一支 A 股</button>
    
    <div id="result" class="result" style="display: none;"></div>
    <div id="error" class="error"></div>

    <script>
        async function getRandomStock() {
            const btn = document.querySelector('button');
            const resultDiv = document.getElementById('result');
            const errorDiv = document.getElementById('error');

            btn.disabled = true;
            resultDiv.style.display = 'none';
            errorDiv.textContent = '';

            try {
                // 使用雪球公开接口获取 A 股列表（更稳定）
                const res = await fetch('https://xueqiu.com/service/v5/stock/screener/quote/list?type=sha&order=desc&orderby=percent&page=1&size=200', {
                    headers: { 'User-Agent': 'Mozilla/5.0' }
                });
                
                if (!res.ok) throw new Error('网络请求失败');

                const data = await res.json();
                const stocks = data.data.list || [];

                if (stocks.length === 0) throw new Error('没有获取到股票数据');

                // 随机抽一只（避开 ST）
                let stock;
                do {
                    stock = stocks[Math.floor(Math.random() * stocks.length)];
                } while (!stock || stock.name.includes('ST') || stock.name.includes('*'));

                const code = stock.symbol.replace('SH', '').replace('SZ', '');
                const name = stock.name;

                resultDiv.innerHTML = `
                    <strong>${name}</strong><br>
                    <span style="font-size: 36px; color: #ffffff;">${code}</span>
                `;
                resultDiv.style.display = 'inline-block';

            } catch (err) {
                console.error(err);
                errorDiv.textContent = '获取失败：' + err.message + '\n可能是网络问题或接口临时限制，请稍等 10 秒再试一次。';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
